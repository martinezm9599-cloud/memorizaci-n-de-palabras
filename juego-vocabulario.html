<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Pizarrón — Juego de Vocabulario</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --board-green: #2c4a3e;
    --board-green-dark: #223b31;
    --frame-brown: #6b4226;
    --frame-brown-dark: #4e2f1a;
    --chalk-white: #f5f5f0;
    --chalk-yellow: #f2c14e;
    --chalk-coral: #e8735c;
    --chalk-blue: #7fb0d8;
    --tray-wood: #8a5a34;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--frame-brown-dark);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 40%);
    font-family: 'Inter', sans-serif;
    color: var(--chalk-white);
  }

  .frame{
    width:100%;
    min-height:100vh;
    background: var(--frame-brown);
    padding: 32px clamp(18px, 6vw, 80px) 0;
    box-shadow: inset 0 0 0 3px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
  }

  .board{
    position:relative;
    background: var(--board-green);
    border-radius: 8px;
    padding: 32px 28px 24px;
    flex: 1;
    min-height: 0;
    overflow:hidden;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.35);
    display:flex;
    flex-direction:column;
  }

  .board-inner{
    width:100%;
    max-width: 640px;
    margin: 0 auto;
    flex:1;
  }

  .board::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px);
    pointer-events:none;
  }

  h1.title{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size: 2rem;
    margin: 0 0 4px;
    color: var(--chalk-white);
    text-shadow: 0 0 6px rgba(255,255,255,0.15);
    letter-spacing: 0.5px;
  }
  .subtitle{
    font-family:'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--chalk-blue);
    margin-bottom: 20px;
    opacity: 0.85;
  }

  /* ---------- SETUP SCREEN ---------- */
  .setup label{
    display:block;
    font-family:'Kalam', cursive;
    font-size: 1.1rem;
    margin-bottom: 8px;
    color: var(--chalk-yellow);
  }
  textarea{
    width:100%;
    min-height: 220px;
    background: rgba(0,0,0,0.25);
    border: 1px dashed rgba(255,255,255,0.35);
    border-radius: 8px;
    color: var(--chalk-white);
    font-family:'Space Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
  }
  textarea::placeholder{
    color: rgba(245,245,240,0.35);
  }
  textarea:focus{
    outline: 2px solid var(--chalk-yellow);
    outline-offset: 2px;
  }
  .hint-text{
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    margin: 8px 0 18px;
    font-family:'Inter';
  }
  .word-count{
    font-family:'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--chalk-blue);
    margin-bottom: 16px;
  }

  /* ---------- BUTTONS ---------- */
  .chalk-btn{
    font-family:'Kalam', cursive;
    font-size: 1.1rem;
    font-weight:700;
    background: transparent;
    color: var(--chalk-white);
    border: 2.5px solid var(--chalk-white);
    border-radius: 10px;
    padding: 12px 26px;
    cursor:pointer;
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .chalk-btn:hover{
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }
  .chalk-btn:focus-visible{
    outline: 3px solid var(--chalk-yellow);
    outline-offset: 3px;
  }
  .chalk-btn.primary{
    border-color: var(--chalk-yellow);
    color: var(--chalk-yellow);
  }
  .chalk-btn.primary:hover{
    background: rgba(242,193,78,0.12);
  }
  .chalk-btn.ghost{
    border-color: rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.7);
    font-size: 0.95rem;
    padding: 8px 18px;
  }

  /* ---------- HUD ---------- */
  .hud{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-bottom: 22px;
    font-family:'Space Mono', monospace;
    font-size: 0.85rem;
  }
  .score-box, .progress-box{ color: var(--chalk-blue); }

  /* ---------- QUESTION ---------- */
  .question-card{
    text-align:center;
    margin-bottom: 26px;
  }
  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--chalk-blue);
    opacity:0.8;
    margin-bottom: 6px;
  }
  .palabra{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size: 2.6rem;
    color: var(--chalk-white);
    text-shadow: 0 0 8px rgba(255,255,255,0.2);
    margin: 4px 0;
  }
  .level-tag{
    display:inline-block;
    font-family:'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--board-green-dark);
    background: var(--chalk-yellow);
    border-radius: 4px;
    padding: 3px 10px;
    margin-bottom: 10px;
  }

  /* ---------- LEVEL 2 (escritura libre) ---------- */
  .answer-input{
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    display:block;
    background: rgba(0,0,0,0.25);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    color: var(--chalk-white);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    padding: 12px 16px;
    text-align:center;
  }
  .answer-input:focus{
    outline: none;
    border-color: var(--chalk-yellow);
  }
  .answer-input.wrong-input{
    border-color: var(--chalk-coral);
  }
  .answer-input.correct-input{
    border-color: #7bd88f;
  }
  .reveal-answer{
    font-family:'Space Mono', monospace;
    font-size: 0.95rem;
    color: var(--chalk-yellow);
    margin-top: 10px;
  }

  .options{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 480px){
    .options{ grid-template-columns: 1fr; }
    .palabra{ font-size: 2rem; }
  }

  .option-btn{
    font-family:'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight:500;
    background: rgba(255,255,255,0.04);
    color: var(--chalk-white);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    padding: 16px 14px;
    cursor:pointer;
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    text-align:left;
  }
  .option-btn:hover:not(:disabled){
    border-color: var(--chalk-yellow);
    background: rgba(242,193,78,0.08);
    transform: translateY(-2px);
  }
  .option-btn:focus-visible{
    outline: 3px solid var(--chalk-yellow);
    outline-offset: 2px;
  }
  .option-btn:disabled{ cursor:default; }
  .option-btn.correct{
    border-color: #7bd88f;
    background: rgba(123,216,143,0.15);
    color: #d7f7de;
  }
  .option-btn.wrong{
    border-color: var(--chalk-coral);
    background: rgba(232,115,92,0.15);
    color: #ffd9d0;
  }

  .level-choice{
    text-align:center;
    font-family:'Kalam', cursive;
    font-size: 1.4rem;
    font-weight:700;
    padding: 26px 14px;
  }
  .level-easy{
    border-color: #7bd88f;
    background: rgba(123,216,143,0.12);
    color: #d7f7de;
  }
  .level-easy:hover:not(:disabled){
    border-color: #7bd88f;
    background: rgba(123,216,143,0.22);
  }
  .level-difficult{
    border-color: var(--chalk-coral);
    background: rgba(232,115,92,0.12);
    color: #ffd9d0;
  }
  .level-difficult:hover:not(:disabled){
    border-color: var(--chalk-coral);
    background: rgba(232,115,92,0.22);
  }

  /* eraser wipe animation */
  .eraser-wipe{
    position:absolute;
    top:0; left: -140px;
    width: 120px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    filter: blur(6px);
    pointer-events:none;
    animation: wipe 0.6s ease forwards;
  }
  @keyframes wipe{
    to{ left: 110%; }
  }

  .feedback-line{
    font-family:'Kalam', cursive;
    font-size: 1.1rem;
    min-height: 1.4em;
    margin-top: 18px;
    text-align:center;
  }
  .feedback-line.ok{ color:#7bd88f; }
  .feedback-line.bad{ color: var(--chalk-coral); }

  .tray{
    height: 26px;
    background: var(--tray-wood);
    border-radius: 0 0 8px 8px;
    margin-top: 14px;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
  }

  /* ---------- END SCREENS ---------- */
  .end-screen{ text-align:center; padding: 30px 0; }
  .end-title{
    font-family:'Kalam', cursive;
    font-size: 2.4rem;
    margin-bottom: 6px;
  }
  .end-title.win{ color: var(--chalk-yellow); }
  .end-title.lose{ color: var(--chalk-coral); }
  .end-stats{
    font-family:'Space Mono', monospace;
    color: var(--chalk-blue);
    margin-bottom: 24px;
  }

  .actions-row{
    display:flex;
    gap: 12px;
    justify-content:center;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .footer-note{
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    padding: 10px 0 4px;
  }
</style>
</head>
<body>

<div class="frame">
  <div class="board" id="board">
    <div class="board-inner">
      <h1 class="title">El Pizarrón</h1>
      <div class="subtitle" id="subtitle">// asociá cada palabra con su definición</div>
      <div id="app"></div>
    </div>
  </div>
  <div class="tray"></div>
</div>

<script>
const app = document.getElementById('app');
const boardEl = document.getElementById('board');

let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) audioCtx = new Ctx();
  }
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', delay = 0, volume = 0.06){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const startTime = ctx.currentTime + delay;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}

function playCorrectSound(){
  playTone(660, 0.12, 'sine', 0);
  playTone(880, 0.16, 'sine', 0.09);
}

function playWrongSound(){
  playTone(220, 0.2, 'sine', 0, 0.05);
}

let state = {
  screen: 'setup', // setup | levelSelect | playing | difficult | win
  words: [],
  queue: [],
  currentIndex: 0,
  currentOptions: [],
  score: 0,
  streak: 0,
  answered: false,
  difficultQueue: [],
  difficultIndex: 0,
  revealed: false,
  difficultFailCounts: {},
  lastMode: 'easy'
};

function parseWords(text){
  return text.split('\n')
    .map(l => l.trim())
    .filter(Boolean)
    .map(line => {
      const idx = line.indexOf(':');
      if(idx === -1) return null;
      const palabra = line.slice(0, idx).trim();
      let resto = line.slice(idx + 1).trim();
      // si viene con una pista de pronunciación entre comillas, se descarta: no se usa en el juego
      const m = resto.match(/["""]([^"""]+)["""]\s*$/);
      if(m){
        resto = resto.slice(0, m.index).trim();
      }
      if(!palabra || !resto) return null;
      return { palabra, definicion: resto };
    })
    .filter(Boolean);
}

function normalizeAnswer(s){
  return s
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[.,;:!?"'¡¿]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render(){
  document.getElementById('subtitle').textContent = state.screen === 'difficult'
    ? '// nivel difícil: respondé de memoria y comprobá vos mismo'
    : '// asociá cada palabra con su definición';
  if(state.screen === 'setup') return renderSetup();
  if(state.screen === 'levelSelect') return renderLevelSelect();
  if(state.screen === 'playing') return renderPlaying();
  if(state.screen === 'difficult') return renderDifficult();
  if(state.screen === 'win') return renderEnd();
  if(state.screen === 'finished') return renderFinished();
}

function renderSetup(){
  app.innerHTML = `
    <div class="setup">
      <label for="wordInput">Pegá tu lista de palabras</label>
      <textarea id="wordInput" spellcheck="false"></textarea>
      <div class="word-count" id="wordCount">El pizarrón está vacío. Pegá tu lista arriba.</div>
      <div class="actions-row">
        <button class="chalk-btn primary" id="startBtn">Empezar</button>
      </div>
    </div>
  `;
  const textarea = document.getElementById('wordInput');
  const wordCountEl = document.getElementById('wordCount');
  const startBtn = document.getElementById('startBtn');

  function updateCount(){
    const parsed = parseWords(textarea.value);
    wordCountEl.style.color = 'var(--chalk-blue)';
    if(textarea.value.trim() === ''){
      wordCountEl.textContent = 'El pizarrón está vacío. Pegá tu lista arriba.';
      return;
    }
    wordCountEl.textContent = parsed.length === 1
      ? '1 palabra cargada'
      : `${parsed.length} palabras cargadas` + (parsed.length < 4 ? ' — cargá al menos 4 para tener buenas opciones múltiples' : '');
  }
  updateCount();
  textarea.addEventListener('input', updateCount);

  startBtn.addEventListener('click', () => {
    const parsed = parseWords(textarea.value);
    if(parsed.length < 2){
      wordCountEl.textContent = 'Necesitás al menos 2 palabras con el formato "palabra: definición"';
      wordCountEl.style.color = 'var(--chalk-coral)';
      return;
    }
    goToLevelSelect(parsed);
  });
}

function goToLevelSelect(words){
  state.words = words;
  state.screen = 'levelSelect';
  render();
}

function renderLevelSelect(){
  app.innerHTML = `
    <div class="question-card">
      <div class="eyebrow">elegí tu nivel</div>
      <div class="palabra" style="font-size:1.6rem;">Elige tu nivel</div>
    </div>
    <div class="options" id="levelGrid">
      <button class="option-btn level-choice level-easy" id="easyBtn">Fácil</button>
      <button class="option-btn level-choice level-difficult" id="difficultBtn">Difícil</button>
    </div>
    <div class="actions-row" style="margin-top:20px;">
      <button class="chalk-btn" id="backBtn">Volver a editar lista</button>
    </div>
  `;
  document.getElementById('easyBtn').addEventListener('click', () => startGame(state.words));
  document.getElementById('difficultBtn').addEventListener('click', () => startDifficult(state.words));
  document.getElementById('backBtn').addEventListener('click', () => {
    state.screen = 'setup';
    render();
  });
}

function startGame(words){
  state.words = words;
  state.queue = shuffle(words);
  state.currentIndex = 0;
  state.score = 0;
  state.streak = 0;
  state.answered = false;
  state.lastMode = 'easy';
  state.screen = 'playing';
  buildOptionsForCurrent();
  render();
}

function buildOptionsForCurrent(){
  const current = state.queue[state.currentIndex];
  const others = state.words.filter(w => w.palabra !== current.palabra);
  const distractorPool = shuffle(others).slice(0, 3);
  const options = shuffle([current, ...distractorPool]);
  state.currentOptions = options.map(o => ({ text: o.definicion, isCorrect: o.palabra === current.palabra }));
  state.answered = false;
}

function startDifficult(words){
  state.words = words;
  state.difficultQueue = shuffle(words);
  state.difficultIndex = 0;
  state.score = 0;
  state.revealed = false;
  state.difficultFailCounts = {};
  state.lastMode = 'difficult';
  state.screen = 'difficult';
  render();
}

function renderPlaying(){
  const current = state.queue[state.currentIndex];

  app.innerHTML = `
    <div class="hud">
      <div class="score-box">PUNTOS: ${state.score}</div>
      <div class="progress-box">${state.currentIndex + 1} / ${state.queue.length}</div>
    </div>
    <div class="question-card">
      <div class="eyebrow">¿qué significa...?</div>
      <div class="palabra">${current.palabra}</div>
    </div>
    <div class="options" id="optionsGrid"></div>
    <div class="feedback-line" id="feedback"></div>
  `;

  const grid = document.getElementById('optionsGrid');
  state.currentOptions.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.addEventListener('click', () => handleAnswer(i));
    grid.appendChild(btn);
  });
}

function handleAnswer(i){
  if(state.answered) return;
  state.answered = true;
  const chosen = state.currentOptions[i];
  const buttons = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedback');

  buttons.forEach((b, idx) => {
    b.disabled = true;
    if(state.currentOptions[idx].isCorrect) b.classList.add('correct');
  });

  if(chosen.isCorrect){
    playCorrectSound();
    state.streak += 1;
    state.score += 10 + (state.streak - 1) * 2;
    feedback.textContent = state.streak > 1 ? `¡Correcto! Racha de ${state.streak} 🟡` : '¡Correcto!';
    feedback.className = 'feedback-line ok';
  } else {
    playWrongSound();
    buttons[i].classList.add('wrong');
    state.streak = 0;
    feedback.textContent = 'No era esa. ¡Seguí probando!';
    feedback.className = 'feedback-line bad';
    const wipe = document.createElement('div');
    wipe.className = 'eraser-wipe';
    boardEl.appendChild(wipe);
    setTimeout(() => wipe.remove(), 650);
  }

  setTimeout(() => {
    state.currentIndex += 1;
    if(state.currentIndex >= state.queue.length){
      state.screen = 'win';
      render();
      return;
    }
    buildOptionsForCurrent();
    render();
  }, 1100);
}

function renderDifficult(){
  const current = state.difficultQueue[state.difficultIndex];
  state.revealed = false;

  app.innerHTML = `
    <div class="hud">
      <div class="score-box">PUNTOS: ${state.score}</div>
      <div class="progress-box">${state.difficultIndex + 1} / ${state.difficultQueue.length}</div>
    </div>
    <div class="question-card">
      <div class="eyebrow">¿qué significa...?</div>
      <div class="palabra">${current.palabra}</div>
    </div>
    <div id="difficultBody" style="text-align:center;"></div>
  `;

  const body = document.getElementById('difficultBody');

  function showPrompt(){
    const failCount = state.difficultFailCounts[current.palabra] || 0;
    const hintHtml = failCount > 0
      ? `<div class="reveal-answer" style="opacity:0.8; margin-bottom:14px;">Pista: la respuesta empieza con "${current.definicion.trim()[0].toUpperCase()}"</div>`
      : '';
    body.innerHTML = `
      ${hintHtml}
      <div class="actions-row">
        <button class="chalk-btn primary" id="revealBtn">Mostrar respuesta</button>
      </div>
    `;
    document.getElementById('revealBtn').addEventListener('click', showAnswer);
  }

  function showAnswer(){
    body.innerHTML = `
      <div class="reveal-answer" style="font-size:1.3rem; margin-bottom:18px;">${current.definicion}</div>
      <div class="feedback-line" id="feedback"></div>
      <div class="actions-row">
        <button class="chalk-btn primary" id="correctBtn">Correcto</button>
        <button class="chalk-btn" id="wrongBtn">Me equivoqué</button>
      </div>
    `;
    document.getElementById('correctBtn').addEventListener('click', () => handleDifficultAnswer(true));
    document.getElementById('wrongBtn').addEventListener('click', () => handleDifficultAnswer(false));
  }

  showPrompt();
}

function handleDifficultAnswer(wasCorrect){
  const current = state.difficultQueue[state.difficultIndex];
  const feedback = document.getElementById('feedback');
  const buttons = document.querySelectorAll('#difficultBody .chalk-btn');
  buttons.forEach(b => b.disabled = true);

  if(wasCorrect){
    playCorrectSound();
    state.streak += 1;
    state.score += 10 + (state.streak - 1) * 2;
    feedback.textContent = state.streak > 1 ? `¡Bien! Racha de ${state.streak} 🟡` : '¡Bien!';
    feedback.className = 'feedback-line ok';
  } else {
    playWrongSound();
    state.streak = 0;
    feedback.textContent = 'Tranquilo/a, esa palabra vuelve a aparecer más adelante.';
    feedback.className = 'feedback-line bad';
    // registrar el fallo para mostrar una pista la próxima vez
    state.difficultFailCounts[current.palabra] = (state.difficultFailCounts[current.palabra] || 0) + 1;
    // esta palabra se vuelve a preguntar al final del nivel
    state.difficultQueue.push(current);
  }

  setTimeout(() => {
    state.difficultIndex += 1;
    if(state.difficultIndex >= state.difficultQueue.length){
      state.screen = 'win';
      render();
      return;
    }
    render();
  }, 1000);
}

function renderEnd(){
  const total = state.words.length;

  if(state.lastMode === 'easy'){
    app.innerHTML = `
      <div class="end-screen">
        <div class="end-title win">¡Completaste el nivel fácil! 🎉</div>
        <div class="end-stats">Puntaje final: ${state.score} · Palabras vistas: ${total} / ${total}</div>
        <div class="actions-row">
          <button class="chalk-btn primary" id="goDifficultBtn">Hacer nivel difícil</button>
          <button class="chalk-btn" id="restartEasyBtn">Volver a empezar</button>
          <button class="chalk-btn" id="finishBtn">Terminar</button>
        </div>
      </div>
    `;
    document.getElementById('goDifficultBtn').addEventListener('click', () => startDifficult(state.words));
    document.getElementById('restartEasyBtn').addEventListener('click', () => startGame(state.words));
    document.getElementById('finishBtn').addEventListener('click', () => {
      state.screen = 'finished';
      render();
    });
    return;
  }

  app.innerHTML = `
    <div class="end-screen">
      <div class="end-title win">¡Completaste la lista! 🎉</div>
      <div class="end-stats">Puntaje final: ${state.score} · Palabras vistas: ${total} / ${total}</div>
      <div class="actions-row">
        <button class="chalk-btn primary" id="retryBtn">Elegir nivel de nuevo</button>
        <button class="chalk-btn" id="editBtn">Editar lista</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    goToLevelSelect(state.words);
  });
  document.getElementById('editBtn').addEventListener('click', () => {
    state.screen = 'setup';
    render();
  });
}

function renderFinished(){
  app.innerHTML = `
    <div class="end-screen">
      <div class="end-title win">¡Muy bien! 🏆</div>
      <div class="end-stats">Puntaje final: ${state.score}</div>
      <div class="actions-row">
        <button class="chalk-btn" id="editBtn">Empezar con otra lista</button>
      </div>
    </div>
  `;
  document.getElementById('editBtn').addEventListener('click', () => {
    state.screen = 'setup';
    render();
  });
}

render();
</script>


</body>
</html>
